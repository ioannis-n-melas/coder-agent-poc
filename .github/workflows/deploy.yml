name: deploy

# Manual deploy — kept gated to avoid surprise spend.
# Wires Workload Identity Federation when the repo is configured for it.
# For now this is a stub showing intent — the actual deploy still happens via
# scripts/deploy.sh from a developer machine.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "poc"
        type: choice
        options: [poc]

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      # ── To enable: set repo vars GCP_PROJECT_ID, GCP_REGION, WIF_PROVIDER, WIF_SA
