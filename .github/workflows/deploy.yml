      #     service_account: ${{ vars.WIF_SA }}
      #
      # - uses: google-github-actions/setup-gcloud@v2
      #
      # - name: Build, push, deploy
      #   run: |
      #     ./scripts/build-and-push.sh
      #     ./scripts/deploy.sh apply
      #     ./scripts/smoke-test.sh

      - name: Stub
        run: |
          echo "Deploy workflow scaffolded. Wire Workload Identity Federation"
          echo "and uncomment the steps above to enable. See ADR 0006."
          echo "For now, deploy from a developer machine: ./scripts/deploy.sh apply"
