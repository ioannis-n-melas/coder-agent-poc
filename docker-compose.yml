# Local dev only — mirrors the Cloud Run deployment shape.
# Not used in production (Cloud Run runs each container independently).

services:
  model-server:
    build:
      context: ./services/model-server
      platforms:
        - linux/amd64
    image: model-server:dev
    ports:
      - "${LOCAL_MODEL_SERVER_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      MODEL_THREADS: "4"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  coder-agent:
    build:
      context: ./services/coder-agent
      platforms:
        - linux/amd64
    image: coder-agent:dev
    ports:
      - "${LOCAL_CODER_AGENT_PORT:-8000}:8080"
    environment:
      PORT: "8080"
      MODEL_SERVER_URL: "http://model-server:8080"
      LOG_LEVEL: "DEBUG"
    depends_on:
      model-server:
        condition: service_healthy
